<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Formularz | Impreza 2w1</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <main class="section">
    <div class="container" style="max-width: 760px;">
      <article class="info-card">
        <h1 style="font-size: clamp(28px, 4vw, 44px); margin-bottom: 12px;">Formularz potwierdzenia</h1>
        <p id="status-text">Wpisz kod z zaproszenia (6 znaków), aby przejść do formularza.</p>
        <p id="invite-hints" style="display:none; margin-top: 8px; color: var(--muted);"></p>

        <form id="login-form" class="form-row" style="margin-top: 18px;">
          <input
            class="input code-input"
            type="text"
            id="code"
            name="code"
            maxlength="6"
            minlength="6"
            pattern="[A-Za-z0-9]{6}"
            placeholder="Np. A7K3P9"
            autocomplete="off"
            spellcheck="false"
            required
          />
          <button class="btn btn-primary" type="submit">Zaloguj kodem</button>
        </form>

        <form id="rsvp-form" style="display:none; margin-top: 24px;">
          <div class="cards-2">
            <div class="section-card" style="padding: 18px; box-shadow: none;">
              <h3>Czy będziesz z nami?</h3>
              <div class="form-row" style="margin-top: 12px;">
                <label><input type="radio" name="attending" value="yes" required /> Tak</label>
                <label><input type="radio" name="attending" value="no" /> Nie</label>
              </div>
            </div>

            <div class="section-card" style="padding: 18px; box-shadow: none;">
              <h3>Menu</h3>
              <p style="margin-top: 10px; color: var(--muted);">Wybierz dietę dla każdej osoby.</p>
              <div id="menu-per-person" class="cards-2" style="margin-top: 12px;"></div>
            </div>
          </div>

          <div class="section-card" style="padding: 18px; box-shadow: none; margin-top: 18px;">
            <h3>Nocleg</h3>
            <div class="form-row" style="margin-top: 12px;">
              <label><input type="radio" name="lodgingNeeded" value="yes" /> Potrzebuję noclegu</label>
              <label><input type="radio" name="lodgingNeeded" value="no" checked /> Nie potrzebuję</label>
            </div>

            <div class="cards-3" id="lodging-fields" style="margin-top: 16px; display:none;">
              <label>
                Od
                <input class="input" type="date" name="lodgingFrom" min="2026-06-03" max="2026-06-07" />
              </label>
              <label>
                Do
                <input class="input" type="date" name="lodgingTo" min="2026-06-03" max="2026-06-07" />
              </label>
              <label>
                Liczba osób
                <input class="input" type="number" name="roomPeople" min="1" max="8" step="1" />
              </label>
            </div>
            <p id="lodging-limit-hint" style="display:none; margin-top: 10px; color: var(--muted);"></p>
          </div>

          <div class="section-card" style="padding: 18px; box-shadow: none; margin-top: 18px;">
            <h3>Uwagi</h3>
            <textarea
              class="input"
              name="notes"
              rows="5"
              maxlength="1000"
              placeholder="Np. alergie, dodatkowe informacje"
              style="border-radius: 14px; width: 100%;"
            ></textarea>
          </div>

          <div class="hero-actions">
            <button class="btn btn-primary" type="submit">Zapisz formularz</button>
            <button class="btn btn-secondary" type="button" id="logout-btn">Wyloguj</button>
          </div>
        </form>
      </article>
    </div>
  </main>

  <div class="popup-modal" id="saved-popup" aria-hidden="true">
    <div class="popup-backdrop" data-popup-close="true"></div>
    <div class="popup-card" role="dialog" aria-modal="true" aria-labelledby="saved-popup-title">
      <div class="icon-badge" style="margin-bottom: 12px;">✓</div>
      <h2 id="saved-popup-title">Formularz zapisany</h2>
      <p>Dziękujemy!</p>
      <button class="btn btn-primary" type="button" id="saved-popup-close">OK</button>
    </div>
  </div>

  <script>
    const loginForm = document.getElementById("login-form");
    const rsvpForm = document.getElementById("rsvp-form");
    const statusText = document.getElementById("status-text");
    const inviteHints = document.getElementById("invite-hints");
    const codeInput = document.getElementById("code");
    const logoutBtn = document.getElementById("logout-btn");
    const lodgingFields = document.getElementById("lodging-fields");
    const lodgingLimitHint = document.getElementById("lodging-limit-hint");
    const menuContainer = document.getElementById("menu-per-person");
    const savedPopup = document.getElementById("saved-popup");
    const savedPopupClose = document.getElementById("saved-popup-close");
    const LODGING_MIN = "2026-06-03";
    const LODGING_MAX = "2026-06-07";
    const ALLOWED_MENU = new Set(["", "standard", "vegetarian", "kids"]);
    const MENU_LABELS = {
      standard: "Standard",
      vegetarian: "Wegetariańskie",
      kids: "Dziecięce",
      "": "Bez preferencji",
    };
    let partyLimit = 1;
    let partyKind = "single";

    function setStatus(message) {
      statusText.textContent = message;
    }

    function openSavedPopup() {
      if (!savedPopup) return;
      savedPopup.setAttribute("aria-hidden", "false");
      savedPopupClose?.focus();
    }

    function closeSavedPopup() {
      if (!savedPopup) return;
      savedPopup.setAttribute("aria-hidden", "true");
    }

    function normalizeCode(value) {
      return String(value || "").trim().toUpperCase();
    }

    function getGuestMeta(invite) {
      const peopleCount = Number(invite?.people_count);
      const limit = Number.isInteger(peopleCount) && peopleCount >= 1 && peopleCount <= 4 ? peopleCount : 1;
      const kind = limit >= 3 ? "family" : limit === 2 ? "pair" : "single";
      return { kind, limit };
    }

    function renderMenuFields(limit, kind) {
      menuContainer.innerHTML = "";
      const menuOptions = kind === "family" ? ["", "standard", "vegetarian", "kids"] : ["", "standard", "vegetarian"];
      for (let i = 1; i <= limit; i += 1) {
        const label = document.createElement("label");
        label.textContent = "Osoba " + i;
        const select = document.createElement("select");
        select.className = "input";
        select.dataset.menuPerson = String(i);
        select.style.borderRadius = "14px";

        for (const value of menuOptions) {
          const option = document.createElement("option");
          option.value = value;
          option.textContent = MENU_LABELS[value];
          select.appendChild(option);
        }

        label.appendChild(select);
        menuContainer.appendChild(label);
      }
    }

    function parseStoredMenuChoices(storedValue, limit) {
      if (!storedValue) return new Array(limit).fill("");

      const raw = String(storedValue).trim();
      let parsed = [];
      if (ALLOWED_MENU.has(raw)) {
        parsed = [raw];
      } else if (raw.startsWith("{") || raw.startsWith("[")) {
        try {
          const json = JSON.parse(raw);
          if (Array.isArray(json)) {
            parsed = json;
          } else if (json && Array.isArray(json.choices)) {
            parsed = json.choices;
          }
        } catch (_) {
          parsed = [];
        }
      }

      const normalized = parsed
        .map((choice) => String(choice || "").trim().toLowerCase())
        .filter((choice) => ALLOWED_MENU.has(choice))
        .slice(0, limit);
      const filled = new Array(limit).fill("");

      if (normalized.length === 1 && limit > 1) {
        return filled.map(() => normalized[0]);
      }

      normalized.forEach((choice, idx) => {
        filled[idx] = choice;
      });
      return filled;
    }

    function readMenuChoices() {
      return Array.from(menuContainer.querySelectorAll("select[data-menu-person]")).map((select) =>
        String(select.value || "").trim().toLowerCase()
      );
    }

    function applyInviteLimits(invite) {
      const meta = getGuestMeta(invite);
      partyLimit = meta.limit;
      partyKind = meta.kind;

      renderMenuFields(partyLimit, partyKind);
      const roomPeopleInput = rsvpForm.elements.roomPeople;
      roomPeopleInput.max = String(partyLimit);
      if (Number(roomPeopleInput.value) > partyLimit) {
        roomPeopleInput.value = String(partyLimit);
      }

      inviteHints.style.display = "block";
      if (meta.kind === "single") {
        inviteHints.textContent = "Zaproszenie dla 1 osoby.";
      } else if (meta.kind === "pair") {
        inviteHints.textContent = "Zaproszenie dla pary (maks. 2 osoby).";
      } else {
        inviteHints.textContent = "Zaproszenie rodzinne. Wpisz faktyczną liczbę osób.";
      }

      lodgingLimitHint.style.display = "block";
      lodgingLimitHint.textContent = "Maksymalna liczba osób na nocleg dla tego zaproszenia: " + partyLimit + ".";
    }

    function setLoggedIn(invite) {
      loginForm.style.display = "none";
      rsvpForm.style.display = "block";
      setStatus("Zalogowano: " + (invite?.label || invite?.code || "kod zaproszenia"));
      applyInviteLimits(invite);
    }

    function setLoggedOut() {
      loginForm.style.display = "flex";
      rsvpForm.style.display = "none";
      setStatus("Wpisz kod z zaproszenia (6 znaków), aby przejść do formularza.");
      inviteHints.style.display = "none";
      lodgingLimitHint.style.display = "none";
      partyLimit = 1;
      partyKind = "single";
      renderMenuFields(1, partyKind);
    }

    function toggleLodgingFields() {
      const selected = rsvpForm.querySelector("input[name='lodgingNeeded']:checked");
      const show = selected && selected.value === "yes";
      lodgingFields.style.display = show ? "grid" : "none";
    }

    async function tryLogin(code) {
      const response = await fetch("/api/login", {
        method: "POST",
        headers: { "content-type": "application/json" },
        body: JSON.stringify({ code }),
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok || !data.ok) {
        throw new Error(data.error || "Nie udało się zalogować.");
      }
      return data;
    }

    function fillForm(rsvp) {
      if (!rsvp) return;

      const attending = Number(rsvp.attending) === 1 ? "yes" : "no";
      const attendingInput = rsvpForm.querySelector("input[name='attending'][value='" + attending + "']");
      if (attendingInput) attendingInput.checked = true;

      const menuChoices = Array.isArray(rsvp.menu_choices) && rsvp.menu_choices.length
        ? rsvp.menu_choices.map((choice) => String(choice || "").trim().toLowerCase()).slice(0, partyLimit)
        : parseStoredMenuChoices(rsvp.menu_choice, partyLimit);
      const selects = menuContainer.querySelectorAll("select[data-menu-person]");
      menuChoices.forEach((choice, idx) => {
        if (selects[idx]) {
          selects[idx].value = choice;
        }
      });

      const lodgingNeeded = Number(rsvp.lodging_needed) === 1 ? "yes" : "no";
      const lodgingInput = rsvpForm.querySelector("input[name='lodgingNeeded'][value='" + lodgingNeeded + "']");
      if (lodgingInput) lodgingInput.checked = true;

      rsvpForm.elements.lodgingFrom.value = rsvp.lodging_from || "";
      rsvpForm.elements.lodgingTo.value = rsvp.lodging_to || "";
      rsvpForm.elements.roomPeople.value = rsvp.room_people || "";
      rsvpForm.elements.notes.value = rsvp.notes || "";
      toggleLodgingFields();
    }

    async function loadSession() {
      const response = await fetch("/api/me", { method: "GET" });
      if (response.status === 401) {
        setLoggedOut();
        return;
      }

      const data = await response.json().catch(() => ({}));
      if (!response.ok || !data.ok) {
        throw new Error(data.error || "Błąd pobierania sesji.");
      }

      setLoggedIn(data.invite);
      fillForm(data.rsvp);
    }

    loginForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      const code = normalizeCode(codeInput.value);
      if (!/^[A-Z0-9]{6}$/.test(code)) {
        setStatus("Kod musi mieć dokładnie 6 znaków (A-Z, 0-9).");
        codeInput.focus();
        return;
      }

      setStatus("Logowanie...");
      try {
        await tryLogin(code);
        await loadSession();
      } catch (error) {
        setStatus(error.message);
      }
    });

    rsvpForm.addEventListener("change", (event) => {
      if (event.target && event.target.name === "lodgingNeeded") {
        toggleLodgingFields();
      }
    });

    rsvpForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const attending = rsvpForm.querySelector("input[name='attending']:checked");
      const lodgingNeeded = rsvpForm.querySelector("input[name='lodgingNeeded']:checked");

      const payload = {
        attending: attending ? attending.value === "yes" : null,
        menuChoices: readMenuChoices(),
        lodgingNeeded: lodgingNeeded ? lodgingNeeded.value === "yes" : false,
        lodgingFrom: rsvpForm.elements.lodgingFrom.value || null,
        lodgingTo: rsvpForm.elements.lodgingTo.value || null,
        roomPeople: rsvpForm.elements.roomPeople.value || null,
        notes: rsvpForm.elements.notes.value || null,
      };

      if (payload.menuChoices.some((choice) => !ALLOWED_MENU.has(choice))) {
        setStatus("Dozwolone opcje menu: Standard, Wegetariańskie" + (partyKind === "family" ? " lub Dziecięce." : "."));
        return;
      }

      if (partyKind !== "family" && payload.menuChoices.includes("kids")) {
        setStatus("Dozwolone opcje menu: Standard lub Wegetariańskie.");
        return;
      }

      if (
        payload.lodgingNeeded &&
        (
          (payload.lodgingFrom && (payload.lodgingFrom < LODGING_MIN || payload.lodgingFrom > LODGING_MAX)) ||
          (payload.lodgingTo && (payload.lodgingTo < LODGING_MIN || payload.lodgingTo > LODGING_MAX))
        )
      ) {
        setStatus("Nocleg można wybrać tylko w zakresie 03.06.2026-07.06.2026.");
        return;
      }

      if (payload.lodgingNeeded && payload.roomPeople && Number(payload.roomPeople) > partyLimit) {
        setStatus("Liczba osób na nocleg nie może przekraczać " + partyLimit + ".");
        return;
      }

      setStatus("Zapisywanie formularza...");
      try {
        const response = await fetch("/api/rsvp", {
          method: "POST",
          headers: { "content-type": "application/json" },
          body: JSON.stringify(payload),
        });

        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Nie udało się zapisać formularza.");
        }
        setStatus("Formularz zapisany.");
        openSavedPopup();
      } catch (error) {
        setStatus(error.message);
      }
    });

    savedPopup?.addEventListener("click", (event) => {
      if (event.target.dataset.popupClose === "true") {
        closeSavedPopup();
      }
    });

    savedPopupClose?.addEventListener("click", closeSavedPopup);

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && savedPopup?.getAttribute("aria-hidden") === "false") {
        closeSavedPopup();
      }
    });

    logoutBtn.addEventListener("click", async () => {
      await fetch("/api/logout", { method: "POST" });
      setLoggedOut();
      codeInput.focus();
    });

    (async () => {
      renderMenuFields(1, partyKind);
      const url = new URL(window.location.href);
      const codeFromQuery = normalizeCode(url.searchParams.get("code"));
      if (/^[A-Z0-9]{6}$/.test(codeFromQuery)) {
        try {
          setStatus("Logowanie kodem z linku...");
          await tryLogin(codeFromQuery);
          url.searchParams.delete("code");
          history.replaceState({}, "", url.pathname);
        } catch (_) {
          // Keep manual login flow.
        }
      }

      try {
        await loadSession();
      } catch (error) {
        setStatus(error.message);
      }
      toggleLodgingFields();
    })();
  </script>
</body>
</html>
