<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Galeria | Impreza 2w1</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <div class="brand-mark">2w1</div>
        <div>Impreza 2w1</div>
      </div>
      <nav class="nav" aria-label="Nawigacja">
        <a href="/index.html">Start</a>
        <a href="/rsvp.html">Formularz</a>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container">
      <article class="info-card">
        <h1 style="font-size: clamp(30px, 4.5vw, 52px); margin-bottom: 8px;">Galeria</h1>
        <p id="status-text">Wrzuć zdjęcia i filmiki z telefonu. Możesz zaznaczyć wiele plików naraz.</p>

        <form id="upload-form" enctype="multipart/form-data" style="margin-top: 18px;">
          <input id="file-input" type="file" name="files" multiple accept="image/*,video/*" hidden />
          <div class="upload-toolbar">
            <button class="btn btn-secondary" type="button" id="pick-files-btn">Wybierz pliki</button>
            <div id="selected-count" class="upload-count">Nie wybrano plików.</div>
            <button class="btn btn-primary" type="submit" id="upload-btn">Wyślij pliki</button>
            <button class="btn btn-secondary" type="button" id="cancel-upload-btn" disabled>Anuluj upload</button>
            <button class="btn btn-secondary" type="button" id="refresh-btn">Odśwież</button>
          </div>
          <div class="upload-list-wrap">
            <ul id="upload-list" class="upload-list"></ul>
          </div>
        </form>
      </article>

      <section class="section" style="padding-top: 20px;">
        <div id="gallery-grid" class="gallery-grid"></div>
        <div class="hero-actions" style="justify-content: center;">
          <button class="btn btn-secondary" type="button" id="load-more-btn" style="display:none;">Załaduj więcej</button>
        </div>
      </section>
    </div>
  </main>

  <div id="preview-modal" class="preview-modal" aria-hidden="true">
    <div class="preview-backdrop" data-close-preview></div>
    <div class="preview-content">
      <button class="btn btn-secondary preview-close" type="button" id="preview-close-btn">Zamknij</button>
      <div id="preview-body" class="preview-body"></div>
    </div>
  </div>

  <script>
    const statusText = document.getElementById("status-text");
    const uploadForm = document.getElementById("upload-form");
    const fileInput = document.getElementById("file-input");
    const pickFilesBtn = document.getElementById("pick-files-btn");
    const uploadBtn = document.getElementById("upload-btn");
    const cancelUploadBtn = document.getElementById("cancel-upload-btn");
    const refreshBtn = document.getElementById("refresh-btn");
    const selectedCount = document.getElementById("selected-count");
    const uploadList = document.getElementById("upload-list");
    const galleryGrid = document.getElementById("gallery-grid");
    const loadMoreBtn = document.getElementById("load-more-btn");
    const previewModal = document.getElementById("preview-modal");
    const previewBody = document.getElementById("preview-body");
    const previewCloseBtn = document.getElementById("preview-close-btn");
    const GALLERY_PAGE_LIMIT = 48;
    let selectedFiles = [];
    let isUploading = false;
    let cancelRequested = false;
    let activeXhr = null;
    let galleryItems = [];
    let nextCursor = null;
    let hasMore = false;
    let isLoadingMore = false;

    function openPreview(url, contentType, altText) {
      previewBody.innerHTML = "";
      if (isVideo(contentType)) {
        const video = document.createElement("video");
        video.src = url;
        video.controls = true;
        video.autoplay = true;
        video.className = "preview-media";
        previewBody.appendChild(video);
      } else {
        const img = document.createElement("img");
        img.src = url;
        img.alt = altText || "Podgląd zdjęcia";
        img.className = "preview-media";
        previewBody.appendChild(img);
      }

      previewModal.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }

    function closePreview() {
      previewModal.setAttribute("aria-hidden", "true");
      previewBody.innerHTML = "";
      document.body.style.overflow = "";
    }

    function setStatus(text) {
      statusText.textContent = text;
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return `${bytes} B`;
      if (bytes < 1024 * 1024) return `${(bytes / 1024).toFixed(1)} KB`;
      return `${(bytes / (1024 * 1024)).toFixed(1)} MB`;
    }

    function escapeHtml(text) {
      return String(text || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function updateSelectedCount() {
      if (selectedFiles.length === 0) {
        selectedCount.textContent = "Nie wybrano plików.";
        return;
      }
      selectedCount.textContent = `Wybrane pliki: ${selectedFiles.length}`;
    }

    function setUploadStatus(index, status, message) {
      const row = uploadList.querySelector(`[data-index="${index}"]`);
      if (!row) return;
      row.setAttribute("data-status", status);

      const badge = row.querySelector(".upload-state");
      if (badge) {
        const labels = {
          queued: "Oczekuje",
          uploading: "Wysyłanie",
          success: "Wysłane",
          error: "Błąd",
        };
        badge.textContent = labels[status] || status;
      }

      const note = row.querySelector(".upload-note");
      if (note) {
        note.textContent = message || "";
      }

      const removeBtn = row.querySelector(".upload-remove");
      if (removeBtn) {
        removeBtn.disabled = isUploading;
      }
    }

    function setUploadProgress(index, percent) {
      const row = uploadList.querySelector(`[data-index="${index}"]`);
      if (!row) return;
      const value = Math.max(0, Math.min(100, Number(percent) || 0));

      const bar = row.querySelector(".upload-progress-fill");
      if (bar) {
        bar.style.width = `${value}%`;
      }

      const note = row.querySelector(".upload-note");
      if (note) {
        note.textContent = `${value}%`;
      }
    }

    function renderUploadList() {
      if (selectedFiles.length === 0) {
        uploadList.innerHTML = "<li class='upload-empty'>Brak plików do wysłania.</li>";
        return;
      }

      uploadList.innerHTML = selectedFiles
        .map((item, index) => {
          const file = item.file;
          const previewTag = item.isVideo
            ? `<video class="upload-thumb" muted playsinline preload="metadata" src="${item.previewUrl}"></video>`
            : `<img class="upload-thumb" alt="${escapeHtml(file.name)}" src="${item.previewUrl}" />`;
          return `
            <li class="upload-row" data-index="${index}" data-status="queued">
              <div class="upload-preview">${previewTag}</div>
              <div class="upload-main">
                <strong>${escapeHtml(file.name)}</strong>
                <span class="upload-size">${formatFileSize(file.size)}</span>
              </div>
              <div class="upload-side">
                <span class="upload-state">Oczekuje</span>
                <span class="upload-note"></span>
              </div>
              <button class="btn btn-secondary upload-remove" type="button" data-remove-index="${index}" ${isUploading ? "disabled" : ""}>Usuń</button>
              <div class="upload-progress">
                <div class="upload-progress-fill"></div>
              </div>
            </li>
          `;
        })
        .join("");
    }

    function isVideo(contentType) {
      return String(contentType || "").startsWith("video/");
    }

    function renderItems(items) {
      if (!items || items.length === 0) {
        galleryGrid.innerHTML = "<p style='color: var(--muted);'>Brak plików w galerii.</p>";
        loadMoreBtn.style.display = "none";
        return;
      }

      galleryGrid.innerHTML = "";

      for (const [index, item] of items.entries()) {
        const card = document.createElement("article");
        card.className = "gallery-item";
        card.style.animationDelay = `${Math.min(index * 40, 320)}ms`;
        card.dataset.url = item.url;
        card.dataset.contentType = item.contentType || "";
        card.dataset.alt = item.key || "";
        card.tabIndex = 0;

        if (isVideo(item.contentType)) {
          const video = document.createElement("video");
          video.src = item.url;
          video.controls = true;
          video.preload = "metadata";
          video.className = "gallery-media";
          card.appendChild(video);
        } else {
          const img = document.createElement("img");
          img.src = item.url;
          img.loading = "lazy";
          img.alt = item.key;
          img.className = "gallery-media";
          card.appendChild(img);
        }

        const meta = document.createElement("div");
        meta.className = "gallery-meta";
        meta.textContent = item.key;
        card.appendChild(meta);

        galleryGrid.appendChild(card);
      }

      loadMoreBtn.style.display = hasMore ? "inline-flex" : "none";
      loadMoreBtn.disabled = false;
      loadMoreBtn.textContent = "Załaduj więcej";
    }

    function uploadSingleFile(file, index) {
      return new Promise((resolve, reject) => {
        const formData = new FormData();
        formData.append("files", file);

        const xhr = new XMLHttpRequest();
        xhr.open("POST", "/api/gallery");
        xhr.responseType = "text";
        activeXhr = xhr;

        setUploadStatus(index, "uploading");
        setUploadProgress(index, 0);

        xhr.upload.onprogress = (event) => {
          if (!event.lengthComputable) return;
          const percent = Math.round((event.loaded / event.total) * 100);
          setUploadProgress(index, percent);
        };

        xhr.onload = () => {
          activeXhr = null;
          let data = {};
          try {
            data = JSON.parse(xhr.responseText || "{}");
          } catch (_) {
            data = {};
          }

          if (xhr.status < 200 || xhr.status >= 300 || !data.ok) {
            reject(new Error(data.error || "Upload nieudany."));
            return;
          }

          setUploadProgress(index, 100);
          setUploadStatus(index, "success");
          resolve(data);
        };

        xhr.onerror = () => {
          activeXhr = null;
          reject(new Error("Błąd sieci podczas uploadu."));
        };

        xhr.onabort = () => {
          activeXhr = null;
          reject(new Error("Upload anulowany."));
        };

        xhr.send(formData);
      });
    }

    async function loadGallery(reset = false) {
      if (reset) {
        nextCursor = null;
        hasMore = false;
        galleryItems = [];
      }

      if (isLoadingMore) return;
      isLoadingMore = true;

      if (nextCursor) {
        setStatus("Ładowanie kolejnych zdjęć...");
        loadMoreBtn.disabled = true;
        loadMoreBtn.textContent = "Ładowanie...";
      } else {
        setStatus("Ładowanie galerii...");
      }

      const qs = new URLSearchParams({ limit: String(GALLERY_PAGE_LIMIT) });
      if (nextCursor) {
        qs.set("cursor", nextCursor);
      }

      try {
        const response = await fetch(`/api/gallery?${qs.toString()}`);
        const data = await response.json().catch(() => ({}));
        if (!response.ok || !data.ok) {
          throw new Error(data.error || "Nie udało się pobrać galerii.");
        }

        galleryItems = galleryItems.concat(data.items || []);
        nextCursor = data.cursor || null;
        hasMore = Boolean(data.hasMore);

        renderItems(galleryItems);
        setStatus(`Plików w galerii: ${galleryItems.length}`);
      } finally {
        isLoadingMore = false;
      }
    }

    pickFilesBtn.addEventListener("click", () => {
      fileInput.click();
    });

    fileInput.addEventListener("change", () => {
      for (const item of selectedFiles) {
        if (item.previewUrl) URL.revokeObjectURL(item.previewUrl);
      }
      selectedFiles = Array.from(fileInput.files || []).map((file) => ({
        file,
        previewUrl: URL.createObjectURL(file),
        isVideo: String(file.type || "").startsWith("video/"),
      }));
      updateSelectedCount();
      renderUploadList();
    });

    uploadList.addEventListener("click", (event) => {
      const btn = event.target.closest(".upload-remove");
      if (!btn) return;
      if (isUploading) return;

      const index = Number(btn.getAttribute("data-remove-index"));
      if (!Number.isInteger(index) || index < 0 || index >= selectedFiles.length) return;

      const [removed] = selectedFiles.splice(index, 1);
      if (removed?.previewUrl) URL.revokeObjectURL(removed.previewUrl);
      updateSelectedCount();
      renderUploadList();
    });

    uploadForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      if (selectedFiles.length === 0) {
        setStatus("Wybierz przynajmniej jeden plik.");
        return;
      }

      isUploading = true;
      cancelRequested = false;
      uploadBtn.disabled = true;
      pickFilesBtn.disabled = true;
      cancelUploadBtn.disabled = false;
      refreshBtn.disabled = true;
      try {
        setStatus(`Wysyłanie ${selectedFiles.length} plików...`);
        let successCount = 0;

        for (let i = 0; i < selectedFiles.length; i += 1) {
          if (cancelRequested) break;
          const file = selectedFiles[i].file;
          try {
            await uploadSingleFile(file, i);
            successCount += 1;
          } catch (error) {
            if (cancelRequested) {
              setUploadStatus(i, "error", "Anulowano");
              break;
            }
            setUploadStatus(i, "error", error.message);
          }
        }

        if (cancelRequested) {
          setStatus(`Upload anulowany. Wysłane: ${successCount}/${selectedFiles.length}`);
        } else {
          setStatus(`Wysłane: ${successCount}/${selectedFiles.length}`);
        }
        if (successCount > 0) {
          await loadGallery(true);
        }

        fileInput.value = "";
        for (const item of selectedFiles) {
          if (item.previewUrl) URL.revokeObjectURL(item.previewUrl);
        }
        selectedFiles = [];
        updateSelectedCount();
        renderUploadList();
      } catch (error) {
        setStatus(error.message);
      } finally {
        isUploading = false;
        cancelRequested = false;
        activeXhr = null;
        uploadBtn.disabled = false;
        pickFilesBtn.disabled = false;
        cancelUploadBtn.disabled = true;
        refreshBtn.disabled = false;
      }
    });

    cancelUploadBtn.addEventListener("click", () => {
      if (!isUploading) return;
      cancelRequested = true;
      if (activeXhr) {
        activeXhr.abort();
      }
    });

    refreshBtn.addEventListener("click", async () => {
      try {
        await loadGallery(true);
      } catch (error) {
        setStatus(error.message);
      }
    });

    loadMoreBtn.addEventListener("click", async () => {
      if (!hasMore) return;
      try {
        await loadGallery(false);
      } catch (error) {
        setStatus(error.message);
        loadMoreBtn.disabled = false;
        loadMoreBtn.textContent = "Załaduj więcej";
      }
    });

    galleryGrid.addEventListener("click", (event) => {
      const card = event.target.closest(".gallery-item");
      if (!card) return;
      openPreview(card.dataset.url, card.dataset.contentType, card.dataset.alt);
    });

    galleryGrid.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      const card = event.target.closest(".gallery-item");
      if (!card) return;
      event.preventDefault();
      openPreview(card.dataset.url, card.dataset.contentType, card.dataset.alt);
    });

    previewModal.addEventListener("click", (event) => {
      if (event.target.matches("[data-close-preview]")) {
        closePreview();
      }
    });

    previewCloseBtn.addEventListener("click", closePreview);

    window.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && previewModal.getAttribute("aria-hidden") === "false") {
        closePreview();
      }
    });

    (async () => {
      updateSelectedCount();
      renderUploadList();
      try {
        await loadGallery(true);
      } catch (error) {
        setStatus(error.message);
      }
    })();
  </script>
</body>
</html>
